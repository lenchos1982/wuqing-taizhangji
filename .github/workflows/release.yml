name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm
        run: npm ci

      - name: Build
        run: npm run tauri build -- --no-bundle

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: src-tauri/target/release/wuqing-taizhangji.exe
