name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: wuqing-taizhangji

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm deps
        working-directory: app/wuqing-taizhangji
        run: npm ci

      - name: Build
        working-directory: app/wuqing-taizhangji
        run: npm run tauri build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-build
          path: wuqing-taizhangji/wuqing-taizhangji/src-tauri/target/release/wuqing-taizhangji

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: wuqing-taizhangji

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm deps
        working-directory: app/wuqing-taizhangji
        run: npm ci

      - name: Build
        working-directory: app/wuqing-taizhangji
        run: npm run tauri build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: wuqing-taizhangji/wuqing-taizhangji/src-tauri/target/release/wuqing-taizhangji.exe
