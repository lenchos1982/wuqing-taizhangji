name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: wuqing-taizhangji

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: '无情台账机 v__VERSION__'
          releaseBody: '自动构建'
          releaseDraft: false
          projectPath: wuqing-taizhangji

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: wuqing-taizhangji

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: '无情台账机 v__VERSION__'
          releaseBody: '自动构建'
          releaseDraft: false
          projectPath: wuqing-taizhangji
