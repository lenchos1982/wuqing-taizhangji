name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: app

      - name: Show directory
        working-directory: app
        run: ls -la

      - name: Show app directory
        working-directory: app
        run: ls -la wuqing-taizhangji/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm deps
        working-directory: app/wuqing-taizhangji
        run: npm ci

      - name: Build
        working-directory: app/wuqing-taizhangji
        run: npm run tauri build
