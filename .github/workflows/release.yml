name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm
        run: npm ci

      - name: Build
        run: npm run tauri build -- --no-bundle

      - name: Show files
        run: ls -la src-tauri/target/release/

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: src-tauri/target/release/wuqing-taizhangji
